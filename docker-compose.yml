services:
  db:
    # restart: always
    image: postgres:16-alpine
    container_name: assetflow-db
    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    # restart: always
    build:
      context: ./backend
    container_name: assetflow-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://assetflow:assetflow_password@db:5432/assetflow
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    # restart: always
    build:
      context: ./frontend
    container_name: assetflow-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  frontend_node_modules:
